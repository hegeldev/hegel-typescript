name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/base
        with:
          ssh-key: ${{ secrets.HEGEL_DEPLOY_KEY }}

      - uses: extractions/setup-just@v2
      - uses: astral-sh/setup-uv@v6

      # TODO(Stage 1): Add typescript toolchain setup here.
      # e.g. actions/setup-go, dtolnay/rust-toolchain, actions/setup-java, etc.

      - run: just setup
      - run: just check

  conformance:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/base
        with:
          ssh-key: ${{ secrets.HEGEL_DEPLOY_KEY }}

      - uses: extractions/setup-just@v2
      - uses: astral-sh/setup-uv@v6

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      # TODO(Stage 1): Add typescript toolchain setup here.

      - run: just setup
      - run: pip install pytest
      - run: just conformance
