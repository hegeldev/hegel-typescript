name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

jobs:
  lint:
    name: lint
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "22"

      - run: npm ci
      - name: Check formatting
        run: npx prettier --check .
      - name: Lint
        run: npx eslint .
      - name: Typecheck
        run: npx tsc --noEmit
      - name: Install zizmor
        run: pip install zizmor
      - name: Run zizmor
        run: zizmor --format plain .github/

  test:
    name: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - uses: astral-sh/setup-uv@d0d8abe699bfb85fec6de9f7adb5ae17292296ff # v6

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "22"

      - run: npm ci
      - name: Run tests
        run: npm run test

  test-node-16:
    name: test (node 16)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - uses: astral-sh/setup-uv@d0d8abe699bfb85fec6de9f7adb5ae17292296ff # v6

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "16"

      - run: npm ci
      - run: npm run build

      - name: Install fixture
        working-directory: tests/old_node
        run: npm install --no-audit --no-fund

      - name: Run old-Node tests
        working-directory: tests/old_node
        run: |
          for f in *.mjs; do
            echo "Running $f"
            node "$f"
          done

  docs:
    name: docs
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "22"

      - run: npm ci
      - name: Build docs
        run: npm run docs

  conformance:
    name: conformance
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Install just
        run: sudo apt-get update && sudo apt-get install -y just
      - uses: astral-sh/setup-uv@d0d8abe699bfb85fec6de9f7adb5ae17292296ff # v6

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.13"

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "22"

      - run: npm ci
      - run: pip install pytest
      - run: just conformance

  release:
    name: release
    if: github.event_name == 'push' && github.repository == 'hegeldev/hegel-typescript'
    needs: [lint, test, test-node-16, docs, conformance]
    runs-on: ubuntu-latest
    permissions:
      contents: write
      checks: read
      # id-token: "enables the workflow to request and use an OIDC token from GitHub's OIDC provider".
      # Used by our trusted publishing flow to npm.
      id-token: write
    outputs:
      skip: ${{ steps.check.outputs.skip }}
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
          fetch-tags: true

      - name: Check for RELEASE.md
        id: check
        run: |
          if [ ! -f RELEASE.md ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Generate app token
        if: steps.check.outputs.skip != 'true'
        uses: actions/create-github-app-token@d72941d797fd3113feb6b93fd0dec494b13a2547 # v1
        id: app-token
        with:
          app-id: ${{ vars.HEGEL_RELEASE_APP_ID }}
          private-key: ${{ secrets.HEGEL_RELEASE_APP_PRIVATE_KEY }}
          repositories: hegel-typescript, website

      - name: Re-checkout with app token # zizmor: ignore[artipacked]
        if: steps.check.outputs.skip != 'true'
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          token: ${{ steps.app-token.outputs.token }}
          fetch-tags: true

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        if: steps.check.outputs.skip != 'true'
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"

      - name: Release
        if: steps.check.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          HEGEL_RELEASE_APP_SLUG: ${{ steps.app-token.outputs.app-slug }}
        run: python .github/scripts/release.py release

      - name: Emit version
        if: steps.check.outputs.skip != 'true'
        id: version
        run: |
          VERSION=$(python -c "import json; print(json.load(open('package.json'))['version'])")
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Install dependencies
        if: steps.check.outputs.skip != 'true'
        run: npm ci

      - name: Build package
        if: steps.check.outputs.skip != 'true'
        run: npm run build

      - name: Publish to npm
        if: steps.check.outputs.skip != 'true'
        run: npm publish

      - name: Push to main or open PR
        if: steps.check.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: python .github/scripts/release.py push-or-pr

  pr-docs:
    name: pr-docs
    needs: [release]
    if: needs.release.outputs.skip != 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Generate app token
        uses: actions/create-github-app-token@d72941d797fd3113feb6b93fd0dec494b13a2547 # v1
        id: app-token
        with:
          app-id: ${{ vars.HEGEL_RELEASE_APP_ID }}
          private-key: ${{ secrets.HEGEL_RELEASE_APP_PRIVATE_KEY }}
          repositories: hegel-typescript, website

      - name: Checkout hegel-typescript at release tag
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: v${{ needs.release.outputs.version }}
          persist-credentials: false

      - name: Checkout website
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4 # zizmor: ignore[artipacked]
        with:
          repository: hegeldev/website
          token: ${{ steps.app-token.outputs.token }}
          path: website

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "22"

      - run: npm ci
      - name: Build docs
        run: npm run docs

      - name: PR docs to website repo
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          HEGEL_RELEASE_APP_ID: ${{ vars.HEGEL_RELEASE_APP_ID }}
          HEGEL_RELEASE_APP_SLUG: ${{ steps.app-token.outputs.app-slug }}
          VERSION: ${{ needs.release.outputs.version }}
        run: python3 .github/scripts/pr_docs.py
